<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="100%" stop-color="#3355DD"/>
    </radialGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- White S letter -->
  <text x="50" y="68" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="62" 
        font-weight="bold"
        fill="white"
        text-anchor="middle"
        clip-path="url(#circle-clip)">S</text>

  <!-- Spark / 4-pointed star top-right -->
  <g transform="translate(68, 28)">
    <!-- Main 4-pointed star -->
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="url(#sparkGrad)"/>
    <!-- Small teal dot -->
    <circle cx="4" cy="10" r="1.5" fill="#4ECDC4"/>
    <!-- Small yellow dot -->
    <circle cx="-6" cy="-6" r="1" fill="#FFD700"/>
  </g>
</svg>
